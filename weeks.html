<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weeks</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    color: #fff;
    font-family: 'Space Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    cursor: default;
    user-select: none;
    overflow: hidden;
  }

  .label {
    font-size: 10px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 14px;
  }

  .main-counter {
    font-size: clamp(48px, 14vw, 180px);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    color: #e8e8e8;
    letter-spacing: -2px;
  }

  .sub {
    font-size: 13px;
    color: #333;
    margin-top: 16px;
    letter-spacing: 3px;
  }

  .grid-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.6s ease;
    z-index: 10;
    background: #000;
  }
  .grid-container.visible {
    opacity: 1;
    pointer-events: auto;
  }

  .grid-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .grid-label {
    font-size: 10px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #555;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(52, 1fr);
    gap: 2px;
    max-width: 90vw;
    max-height: 70vh;
  }

  .week {
    width: clamp(4px, 1.2vw, 10px);
    height: clamp(4px, 1.2vw, 10px);
    border-radius: 1px;
    cursor: default;
  }
  .week.spent {
    background: #222;
  }
  .week.logged {
    background: #00ff88;
    box-shadow: 0 0 4px #00ff8833;
  }
  .week.now {
    background: #e8e8e8;
    box-shadow: 0 0 6px #e8e8e844;
    cursor: pointer;
  }
  .week.now:hover {
    box-shadow: 0 0 12px #00ff8866;
  }
  .week.remaining {
    background: #0a0a0a;
    border: 1px solid #1a1a1a;
  }
  .week.clickable {
    cursor: pointer;
  }
  .week.clickable:hover {
    box-shadow: 0 0 8px #00ff8844;
  }

  .grid-sub {
    font-size: 11px;
    color: #333;
    letter-spacing: 3px;
  }

  .input-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.92);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 30;
    gap: 16px;
  }
  .input-overlay.visible {
    display: flex;
  }

  .input-prompt {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #555;
  }

  .input-week {
    font-size: 10px;
    color: #333;
    letter-spacing: 3px;
    margin-bottom: 8px;
  }

  .habit-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid #333;
    color: #00ff88;
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    width: 400px;
    max-width: 80vw;
    padding: 8px 0;
    outline: none;
    text-align: center;
    letter-spacing: 1px;
  }
  .habit-input::placeholder {
    color: #222;
  }

  .input-hint {
    font-size: 9px;
    color: #222;
    letter-spacing: 3px;
  }

  .input-close {
    position: absolute;
    top: 24px;
    right: 24px;
    font-size: 9px;
    color: #333;
    cursor: pointer;
    letter-spacing: 3px;
  }

  .toggle-hint {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    color: #2a2a2a;
    letter-spacing: 4px;
    text-transform: uppercase;
    z-index: 20;
  }

  .source {
    position: fixed;
    bottom: 24px;
    right: 24px;
    font-size: 8px;
    color: #222;
    letter-spacing: 2px;
    z-index: 20;
  }

  .stats {
    font-size: 10px;
    color: #333;
    letter-spacing: 3px;
    margin-top: 4px;
  }
  .stats .green { color: #00ff88; }
</style>
</head>
<body>

<div class="label">Weeks left to live</div>
<div class="main-counter" id="main">0</div>
<div class="sub" id="sub"></div>

<div class="grid-container" id="gridContainer">
  <div class="grid-inner">
    <div class="grid-label">Each dot is one week. 90 years.</div>
    <div class="grid" id="grid"></div>
    <div class="grid-sub" id="gridSub"></div>
    <div class="stats" id="stats"></div>
  </div>
</div>

<div class="input-overlay" id="inputOverlay">
  <div class="input-close" id="inputClose">ESC</div>
  <div class="input-prompt">What did you do this week?</div>
  <div class="input-week" id="inputWeek"></div>
  <input type="text" class="habit-input" id="habitInput" placeholder="one line" maxlength="140" autocomplete="off">
  <div class="input-hint">enter to log &middot; esc to cancel</div>
</div>

<div class="toggle-hint">click to toggle view</div>
<div class="source">born 3.23.80</div>

<script>
var BIRTH = new Date(1980, 2, 23);
var DEATH = new Date(2070, 2, 23);
var TOTAL_WEEKS = Math.floor((DEATH - BIRTH) / (7 * 24 * 60 * 60 * 1000));
var MS_PER_WEEK = 7 * 24 * 60 * 60 * 1000;

var showGrid = false;
var activeWeek = null;

var gridContainer = document.getElementById('gridContainer');
var mainEl = document.getElementById('main');
var subEl = document.getElementById('sub');
var gridEl = document.getElementById('grid');
var gridSubEl = document.getElementById('gridSub');
var statsEl = document.getElementById('stats');
var inputOverlay = document.getElementById('inputOverlay');
var habitInput = document.getElementById('habitInput');
var inputWeek = document.getElementById('inputWeek');
var inputClose = document.getElementById('inputClose');

// Habit log stored in localStorage
function getLog() {
  try {
    return JSON.parse(localStorage.getItem('weeks_log') || '{}');
  } catch(e) {
    return {};
  }
}

function saveLog(log) {
  localStorage.setItem('weeks_log', JSON.stringify(log));
}

function getWeekDate(weekIndex) {
  var d = new Date(BIRTH.getTime() + weekIndex * MS_PER_WEEK);
  var month = d.toLocaleString('en-US', { month: 'short' });
  var year = d.getFullYear();
  return month + ' ' + year;
}

function getCurrentWeek() {
  return Math.floor((Date.now() - BIRTH.getTime()) / MS_PER_WEEK);
}

function getWeeksLeft() {
  return (DEATH.getTime() - Date.now()) / MS_PER_WEEK;
}

function getWeeksSpent() {
  return (Date.now() - BIRTH.getTime()) / MS_PER_WEEK;
}

function formatWeeks(w) {
  return Math.floor(w).toLocaleString('en-US');
}

function update() {
  var left = getWeeksLeft();
  var spent = getWeeksSpent();
  var pct = ((spent / TOTAL_WEEKS) * 100).toFixed(1);
  mainEl.textContent = formatWeeks(left);
  subEl.textContent = pct + '% spent';
  requestAnimationFrame(update);
}

function buildGrid() {
  var spent = getCurrentWeek();
  var log = getLog();
  var loggedCount = 0;

  while (gridEl.firstChild) gridEl.removeChild(gridEl.firstChild);

  for (var i = 0; i < TOTAL_WEEKS; i++) {
    var dot = document.createElement('div');
    dot.className = 'week';
    dot.setAttribute('data-week', i);

    if (i < spent) {
      if (log[i]) {
        dot.classList.add('logged');
        dot.title = log[i];
        loggedCount++;
      } else {
        dot.classList.add('spent');
      }
      // Recent weeks (last 4) are clickable to log retroactively
      if (i >= spent - 4) {
        dot.classList.add('clickable');
      }
    } else if (i === spent) {
      if (log[i]) {
        dot.classList.add('logged');
        dot.title = log[i];
        loggedCount++;
      } else {
        dot.classList.add('now');
      }
    } else {
      dot.classList.add('remaining');
    }
    gridEl.appendChild(dot);
  }

  gridSubEl.textContent = spent.toLocaleString() + ' spent  /  ' + (TOTAL_WEEKS - spent).toLocaleString() + ' left';

  if (loggedCount > 0) {
    statsEl.textContent = '';
    var greenSpan = document.createElement('span');
    greenSpan.className = 'green';
    greenSpan.textContent = loggedCount;
    statsEl.appendChild(greenSpan);
    statsEl.appendChild(document.createTextNode(' weeks you showed up'));
  } else {
    statsEl.textContent = '';
  }
}

// Handle dot clicks in grid
gridEl.addEventListener('click', function(e) {
  e.stopPropagation();
  var dot = e.target;
  if (!dot.classList.contains('week')) return;

  var weekIdx = parseInt(dot.getAttribute('data-week'));
  var currentWeek = getCurrentWeek();

  // Only allow logging current week and last 4 weeks
  if (weekIdx > currentWeek) return;
  if (weekIdx < currentWeek - 4) return;

  activeWeek = weekIdx;
  inputWeek.textContent = 'Week of ' + getWeekDate(weekIdx);
  habitInput.value = getLog()[weekIdx] || '';
  inputOverlay.classList.add('visible');
  habitInput.focus();
});

// Handle input submission
habitInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && habitInput.value.trim()) {
    var log = getLog();
    log[activeWeek] = habitInput.value.trim();
    saveLog(log);
    inputOverlay.classList.remove('visible');
    habitInput.value = '';
    activeWeek = null;
    buildGrid();
  }
  if (e.key === 'Escape') {
    inputOverlay.classList.remove('visible');
    habitInput.value = '';
    activeWeek = null;
  }
});

inputClose.addEventListener('click', function(e) {
  e.stopPropagation();
  inputOverlay.classList.remove('visible');
  habitInput.value = '';
  activeWeek = null;
});

inputOverlay.addEventListener('click', function(e) {
  if (e.target === inputOverlay) {
    inputOverlay.classList.remove('visible');
    habitInput.value = '';
    activeWeek = null;
  }
});

// Toggle between counter and grid
document.body.addEventListener('click', function(e) {
  if (inputOverlay.classList.contains('visible')) return;
  showGrid = !showGrid;
  if (showGrid) {
    buildGrid();
    gridContainer.classList.add('visible');
  } else {
    gridContainer.classList.remove('visible');
  }
});

update();
</script>
</body>
</html>
