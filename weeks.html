<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weeks</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    color: #fff;
    font-family: 'Space Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    cursor: default;
    user-select: none;
    overflow: hidden;
  }

  .label {
    font-size: 10px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 14px;
  }

  .main-counter {
    font-size: clamp(48px, 14vw, 180px);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    color: #e8e8e8;
    letter-spacing: -2px;
  }

  .sub {
    font-size: 13px;
    color: #333;
    margin-top: 16px;
    letter-spacing: 3px;
  }

  .grid-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.6s ease;
    z-index: 10;
    background: #000;
  }
  .grid-container.visible {
    opacity: 1;
    pointer-events: auto;
  }

  .grid-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .grid-label {
    font-size: 10px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #555;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(52, 1fr);
    gap: 2px;
    max-width: 90vw;
    max-height: 70vh;
  }

  .week {
    width: clamp(4px, 1.2vw, 10px);
    height: clamp(4px, 1.2vw, 10px);
    border-radius: 1px;
  }
  .week.spent {
    background: #222;
  }
  .week.now {
    background: #e8e8e8;
    box-shadow: 0 0 6px #e8e8e844;
  }
  .week.remaining {
    background: #0a0a0a;
    border: 1px solid #1a1a1a;
  }

  .grid-sub {
    font-size: 11px;
    color: #333;
    letter-spacing: 3px;
  }

  .toggle-hint {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    color: #2a2a2a;
    letter-spacing: 4px;
    text-transform: uppercase;
    z-index: 20;
  }

  .source {
    position: fixed;
    bottom: 24px;
    right: 24px;
    font-size: 8px;
    color: #222;
    letter-spacing: 2px;
    z-index: 20;
  }
</style>
</head>
<body>

<div class="label">Weeks left to live</div>
<div class="main-counter" id="main">0</div>
<div class="sub" id="sub"></div>

<div class="grid-container" id="gridContainer">
  <div class="grid-inner">
    <div class="grid-label">Each dot is one week. 90 years.</div>
    <div class="grid" id="grid"></div>
    <div class="grid-sub" id="gridSub"></div>
  </div>
</div>

<div class="toggle-hint">click to toggle view</div>
<div class="source">born 3.23.80</div>

<script>
const BIRTH = new Date(1980, 2, 23);
const DEATH = new Date(2070, 2, 23);
const TOTAL_WEEKS = Math.floor((DEATH - BIRTH) / (7 * 24 * 60 * 60 * 1000));

let showGrid = false;
const gridContainer = document.getElementById('gridContainer');
const mainEl = document.getElementById('main');
const subEl = document.getElementById('sub');
const gridEl = document.getElementById('grid');
const gridSubEl = document.getElementById('gridSub');

function getWeeksLeft() {
  const now = Date.now();
  const msLeft = DEATH.getTime() - now;
  return msLeft / (7 * 24 * 60 * 60 * 1000);
}

function getWeeksSpent() {
  const now = Date.now();
  const msSpent = now - BIRTH.getTime();
  return msSpent / (7 * 24 * 60 * 60 * 1000);
}

function formatWeeks(w) {
  return Math.floor(w).toLocaleString('en-US');
}

function update() {
  const left = getWeeksLeft();
  const spent = getWeeksSpent();
  const pct = ((spent / TOTAL_WEEKS) * 100).toFixed(1);
  mainEl.textContent = formatWeeks(left);
  subEl.textContent = pct + '% spent';
  requestAnimationFrame(update);
}

// Build grid using safe DOM methods
function buildGrid() {
  const spent = Math.floor(getWeeksSpent());
  while (gridEl.firstChild) gridEl.removeChild(gridEl.firstChild);
  for (let i = 0; i < TOTAL_WEEKS; i++) {
    const dot = document.createElement('div');
    dot.className = 'week';
    if (i < spent) {
      dot.classList.add('spent');
    } else if (i === spent) {
      dot.classList.add('now');
    } else {
      dot.classList.add('remaining');
    }
    gridEl.appendChild(dot);
  }
  gridSubEl.textContent = spent.toLocaleString() + ' spent  /  ' + (TOTAL_WEEKS - spent).toLocaleString() + ' left';
}

document.body.addEventListener('click', function() {
  showGrid = !showGrid;
  if (showGrid) {
    buildGrid();
    gridContainer.classList.add('visible');
  } else {
    gridContainer.classList.remove('visible');
  }
});

update();
</script>
</body>
</html>
