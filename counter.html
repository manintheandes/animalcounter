<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Count</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    color: #fff;
    font-family: 'Space Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    cursor: default;
    user-select: none;
    overflow: hidden;
  }

  .label {
    font-size: 10px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 14px;
  }

  .main-counter {
    font-size: clamp(48px, 14vw, 180px);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    color: #e8e8e8;
    letter-spacing: -2px;
  }

  .main-counter.paused {
    color: #000;
    text-shadow: 0 0 1px #333;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: #222;
    margin: 48px 0;
  }

  .label-offset {
    font-size: 10px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #333;
    margin-bottom: 10px;
  }

  .counter-offset {
    font-size: clamp(18px, 3vw, 36px);
    font-weight: 400;
    font-variant-numeric: tabular-nums;
    color: #333;
    line-height: 1;
  }

  .offset-label {
    font-size: 10px;
    color: #282828;
    margin-top: 8px;
    letter-spacing: 3px;
  }

  .pause-hint {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    color: #2a2a2a;
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .pause-flash {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.05s;
  }
  .pause-flash.active {
    opacity: 0.03;
  }

  .source {
    position: fixed;
    bottom: 24px;
    right: 24px;
    font-size: 8px;
    color: #222;
    letter-spacing: 2px;
    text-align: right;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div class="label">Animals killed (by humans) since you opened this page</div>
<div class="main-counter" id="main">0</div>

<div class="pause-hint">click anywhere for one second of silence</div>
<div class="pause-flash" id="flash"></div>
<div class="source">~35T insects + ~80B land animals/yr</div>

<script>
// 35 trillion insects + 80 billion land animals = ~35.08 trillion/year
// 35,080,000,000,000 / 365.25 / 24 / 3600 = ~1,112,125 per second
const KILL_RATE = 1112125;

let startTime = Date.now();
let totalPaused = 0;
let pauseStart = null;
let isPaused = false;

const mainEl = document.getElementById('main');
const flashEl = document.getElementById('flash');

function formatNumber(n) {
  return Math.floor(n).toLocaleString('en-US');
}

function update() {
  const now = Date.now();
  let elapsed = (now - startTime - totalPaused) / 1000;

  if (isPaused) {
    elapsed = (pauseStart - startTime - totalPaused) / 1000;
  }

  mainEl.textContent = formatNumber(elapsed * KILL_RATE);
  requestAnimationFrame(update);
}

document.body.addEventListener('click', () => {
  if (isPaused) return;

  isPaused = true;
  pauseStart = Date.now();
  mainEl.classList.add('paused');
  flashEl.classList.add('active');

  setTimeout(() => {
    flashEl.classList.remove('active');
  }, 100);

  setTimeout(() => {
    totalPaused += Date.now() - pauseStart;
    isPaused = false;
    mainEl.classList.remove('paused');
    pauseStart = null;
  }, 1000);
});

update();
</script>
</body>
</html>
