<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ridge Trail</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    cursor: crosshair;
    transition: all 0.8s ease;
  }
  body.ultralight {
    background: #fff;
    cursor: default;
  }
  canvas {
    display: block;
    transition: opacity 0.8s ease;
  }
  body.ultralight canvas { opacity: 0; }

  .trail-name {
    position: fixed;
    top: 32px;
    left: 32px;
    color: #2a2a2a;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0.4;
    transition: all 0.8s ease;
  }
  body.ultralight .trail-name {
    color: #111;
    font-size: 24px;
    opacity: 1;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    letter-spacing: 8px;
  }

  .dog-labels {
    display: none;
  }
  body.ultralight .dog-labels {
    display: block;
    position: fixed;
    top: calc(50% + 40px);
    left: 50%;
    transform: translateX(-50%);
    color: #555;
    font-size: 13px;
    letter-spacing: 6px;
    text-align: center;
  }

  .toggle {
    position: fixed;
    bottom: 24px;
    right: 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 10;
    cursor: pointer;
  }
  .toggle-label {
    color: #444;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    transition: color 0.8s;
  }
  body.ultralight .toggle-label { color: #999; }
  .toggle-switch {
    width: 36px;
    height: 18px;
    background: #333;
    border-radius: 9px;
    position: relative;
    transition: background 0.4s;
  }
  body.ultralight .toggle-switch { background: #ccc; }
  .toggle-knob {
    width: 14px;
    height: 14px;
    background: #00ff88;
    border-radius: 50%;
    position: absolute;
    top: 2px;
    left: 2px;
    transition: all 0.4s;
    box-shadow: 0 0 8px #00ff8866;
  }
  body.ultralight .toggle-knob {
    left: 20px;
    background: #111;
    box-shadow: none;
  }

  .credit {
    position: fixed;
    bottom: 24px;
    left: 24px;
    color: #2a2a2a;
    font-family: 'Courier New', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    transition: color 0.8s;
  }
  body.ultralight .credit { color: #ccc; }
</style>
</head>
<body>

<div class="trail-name">Donner Ridge Trail<br><span style="font-size:0.8em;opacity:0.5">Truckee, CA &middot; 7,840 ft</span></div>
<div class="dog-labels">Elie &middot; Tunnels &middot; Osa</div>

<div class="toggle" onclick="document.body.classList.toggle('ultralight')">
  <span class="toggle-label">Ultralight</span>
  <div class="toggle-switch"><div class="toggle-knob"></div></div>
</div>

<div class="credit">Claude + Gemini &middot; 2026</div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
let mouseX = -100, mouseY = -100;
let hasMoved = false;

// Dog orbs with staggered follow
const dogs = [
  { name: 'Elie',    x: -100, y: -100, color: '#00ff88', delay: 0.08 },
  { name: 'Tunnels', x: -100, y: -100, color: '#00ddaa', delay: 0.04 },
  { name: 'Osa',     x: -100, y: -100, color: '#00bbcc', delay: 0.02 },
];

// Targets cascade: Elie follows mouse, Tunnels follows Elie, Osa follows Tunnels
let targets = [
  { x: -100, y: -100 },
  { x: -100, y: -100 },
  { x: -100, y: -100 },
];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

window.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  hasMoved = true;
});

// Simple noise function for topo lines
function noise(x, y, seed) {
  const s = Math.sin(x * 0.003 + seed) * 43758.5453;
  const c = Math.cos(y * 0.004 + seed * 1.3) * 22578.1459;
  return (Math.sin(s + c) + 1) / 2;
}

function elevation(x, y) {
  let e = 0;
  e += Math.sin(x * 0.004 + 1.2) * Math.cos(y * 0.003 + 0.8) * 0.5;
  e += Math.sin(x * 0.008 + 3.1) * Math.cos(y * 0.006 + 2.2) * 0.25;
  e += Math.sin(x * 0.015 + 0.5) * Math.cos(y * 0.012 + 1.7) * 0.125;
  e += Math.sin(x * 0.002 + y * 0.001) * 0.3;
  return e;
}

// Precompute topo lines using marching squares (simplified)
const topoLines = [];
const step = 6;
const levels = 18;

function computeTopo() {
  topoLines.length = 0;
  for (let level = 0; level < levels; level++) {
    const threshold = -0.8 + (level / levels) * 1.6;
    const lines = [];
    for (let x = 0; x < W; x += step) {
      for (let y = 0; y < H; y += step) {
        const e = elevation(x, y);
        const eR = elevation(x + step, y);
        const eB = elevation(x, y + step);

        if ((e >= threshold) !== (eR >= threshold)) {
          const t = (threshold - e) / (eR - e);
          lines.push({ x: x + t * step, y: y });
        }
        if ((e >= threshold) !== (eB >= threshold)) {
          const t = (threshold - e) / (eB - e);
          lines.push({ x: x, y: y + t * step });
        }
      }
    }
    topoLines.push({ threshold, lines, opacity: 0.15 + (level / levels) * 0.25 });
  }
}

let topoReady = false;
setTimeout(() => { computeTopo(); topoReady = true; }, 50);
window.addEventListener('resize', () => { topoReady = false; setTimeout(() => { computeTopo(); topoReady = true; }, 100); });

let time = 0;

function draw() {
  ctx.clearRect(0, 0, W, H);
  time += 0.005;

  // Draw topo lines as dots
  if (topoReady) {
    for (const layer of topoLines) {
      for (const pt of layer.lines) {
        // Glow near mouse
        const dx = pt.x - mouseX;
        const dy = pt.y - mouseY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const proximity = Math.max(0, 1 - dist / 250);

        const baseAlpha = layer.opacity * 0.6;
        const alpha = baseAlpha + proximity * 0.5;

        ctx.fillStyle = `rgba(0, 255, 136, ${alpha})`;
        const size = 1 + proximity * 1.5;
        ctx.fillRect(pt.x - size/2, pt.y - size/2, size, size);
      }
    }
  }

  // Update dog positions
  targets[0].x += (mouseX - targets[0].x) * dogs[0].delay;
  targets[0].y += (mouseY - targets[0].y) * dogs[0].delay;

  for (let i = 1; i < 3; i++) {
    targets[i].x += (targets[i-1].x - targets[i].x) * dogs[i].delay;
    targets[i].y += (targets[i-1].y - targets[i].y) * dogs[i].delay;
  }

  // Snap dogs near topo lines (slight magnetic pull)
  for (let i = 0; i < 3; i++) {
    const dog = dogs[i];
    dog.x += (targets[i].x - dog.x) * 0.12;
    dog.y += (targets[i].y - dog.y) * 0.12;

    if (!hasMoved) continue;

    // Draw dog orb
    const pulse = 1 + Math.sin(time * 3 + i * 2) * 0.15;

    // Outer glow
    const grad = ctx.createRadialGradient(dog.x, dog.y, 0, dog.x, dog.y, 30 * pulse);
    grad.addColorStop(0, dog.color + '44');
    grad.addColorStop(0.5, dog.color + '11');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(dog.x, dog.y, 30 * pulse, 0, Math.PI * 2);
    ctx.fill();

    // Core
    const coreGrad = ctx.createRadialGradient(dog.x, dog.y, 0, dog.x, dog.y, 6);
    coreGrad.addColorStop(0, '#ffffff');
    coreGrad.addColorStop(0.3, dog.color);
    coreGrad.addColorStop(1, dog.color + '00');
    ctx.fillStyle = coreGrad;
    ctx.beginPath();
    ctx.arc(dog.x, dog.y, 6, 0, Math.PI * 2);
    ctx.fill();

    // Name label
    ctx.fillStyle = dog.color + '99';
    ctx.font = '9px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(dog.name, dog.x, dog.y - 14);
  }

  // Ambient floating particles
  for (let i = 0; i < 15; i++) {
    const px = (Math.sin(time * 0.7 + i * 47.3) * 0.5 + 0.5) * W;
    const py = (Math.cos(time * 0.5 + i * 31.7) * 0.5 + 0.5) * H;
    const alpha = Math.sin(time * 2 + i) * 0.1 + 0.1;
    ctx.fillStyle = `rgba(0, 255, 136, ${alpha})`;
    ctx.fillRect(px, py, 1, 1);
  }

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
